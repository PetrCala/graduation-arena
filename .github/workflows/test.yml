name: test

# Run the pytest suite for the Python data pipeline in pipeline/. The suite is
# configured in pipeline/pyproject.toml and uses no live network (see
# docs/pipeline-handoff.md), so it is safe in CI. uv installs the exact versions
# pinned in pipeline/uv.lock, so CI and a local `uv run pytest` never disagree.

on:
  push:
    branches: [master]
    paths:
      - "pipeline/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "pipeline/**"
      - ".github/workflows/test.yml"

# A newer push/PR update cancels an in-flight run for the same ref.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pipeline/uv.lock"

      - name: Install locked deps (incl. dev tools)
        run: uv sync --frozen

      - name: Test (pytest)
        run: uv run pytest
