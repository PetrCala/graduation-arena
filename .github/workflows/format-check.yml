name: format-check

# Check formatting of the Python data pipeline in pipeline/ with
# `ruff format --check`. ruff's config lives in pipeline/pyproject.toml; uv
# installs the exact tool versions pinned in pipeline/uv.lock, so CI and a local
# `uv run ruff format --check` never disagree.

on:
  push:
    branches: [master]
    paths:
      - "pipeline/**"
      - ".github/workflows/format-check.yml"
  pull_request:
    paths:
      - "pipeline/**"
      - ".github/workflows/format-check.yml"

# A newer push/PR update cancels an in-flight run for the same ref.
concurrency:
  group: format-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pipeline/uv.lock"

      - name: Install locked deps (incl. dev tools)
        run: uv sync --frozen

      - name: Format check (ruff format --check)
        run: uv run ruff format --check
