name: pipeline

# Lint, format-check, and test the Python data pipeline in pipeline/.
# ruff config and the pytest suite live in pipeline/pyproject.toml; this gate keeps
# them green on every PR. uv installs the exact tool versions pinned in
# pipeline/uv.lock, so CI and a local `uv run ruff/pytest` never disagree. The
# suite uses no live network (see docs/pipeline-handoff.md), so it is safe in CI.

on:
  push:
    branches: [master]
    paths:
      - "pipeline/**"
      - ".github/workflows/pipeline.yml"
  pull_request:
    paths:
      - "pipeline/**"
      - ".github/workflows/pipeline.yml"

# A newer push/PR update cancels an in-flight run for the same ref.
concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "pipeline/uv.lock"

      - name: Install locked deps (incl. dev tools)
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format check (ruff format --check)
        run: uv run ruff format --check

      - name: Test (pytest)
        run: uv run pytest
